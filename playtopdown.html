<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Kiddow Adventure - Interactive Buildings</title>
    <style>
        body { margin: 0; background-color: #1a1a1a; overflow: hidden; font-family: sans-serif; }
        #game-container { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
        #world { position: absolute; width: 3000px; height: 3000px; will-change: transform; }
        canvas { display: block; image-rendering: pixelated; position: absolute; top: 0; left: 0; z-index: 0; }
        
        #player {
            width: 200px; height: 200px; position: absolute;
            background-size: 1000px 1000px; background-repeat: no-repeat;
            will-change: transform, left, top; margin-left: -100px; margin-top: -180px;
            pointer-events: none;
        }

        /* --- MINIMAP STYLING --- */
        #minimap-container {
            position: fixed; top: 10px; right: 10px;
            width: 150px; height: 150px;
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #fff; border-radius: 8px;
            z-index: 10001; overflow: hidden;
        }
        #minimap-player {
            position: absolute; width: 8px; height: 8px;
            background: #00ff00; border-radius: 50%;
            transform: translate(-50%, -50%); z-index: 10;
            box-shadow: 0 0 5px #00ff00;
        }
        .minimap-dot {
            position: absolute; width: 6px; height: 6px;
            background: yellow; border-radius: 2px;
            transform: translate(-50%, -50%); z-index: 5;
        }

        #ui {
            position: fixed; top: 10px; left: 10px;
            color: white; background: rgba(0,0,0,0.6);
            padding: 12px; border-radius: 8px;
            z-index: 10000; border: 1px solid rgba(255,255,255,0.2);
        }
        
        /* Notifikasi Interaksi */
        #interaction-msg {
            position: fixed; bottom: 20px; left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 0, 0.9);
            color: black; padding: 10px 20px;
            border-radius: 50px; font-weight: bold;
            display: none; z-index: 10002;
        }

        .building-object { position: absolute; transform-origin: bottom center; pointer-events: none; }
    </style>
</head>
<body>

    <div id="ui">
        <b>Kiddow Adventure: Interactive</b><br>
        Sentuh gedung untuk membuka Website!
    </div>

    <div id="interaction-msg">Membuka Website...</div>

    <div id="minimap-container">
        <div id="minimap-player"></div>
    </div>
    
    <div id="game-container">
        <div id="world">
            <canvas id="forestCanvas"></canvas>
            <div id="player"></div>
            <div id="objects-layer"></div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('forestCanvas');
        const ctx = canvas.getContext('2d');
        const world = document.getElementById('world');
        const player = document.getElementById('player');
        const objectsLayer = document.getElementById('objects-layer');
        const minimap = document.getElementById('minimap-container');
        const miniPlayer = document.getElementById('minimap-player');
        const interMsg = document.getElementById('interaction-msg');

        const WORLD_SIZE = 3000;
        const miniSize = 150;
        canvas.width = WORLD_SIZE;
        canvas.height = WORLD_SIZE;

        const URL_IDLE = 'https://firstian84.github.io/game_siderunner/firstianKIDDOW-idle.png';
        const URL_RUN = 'https://firstian84.github.io/game_siderunner/firstianKIDDOW-run.png';
        const URL_GEDUNG = 'https://firstian84.github.io/game_siderunner/resjaksel.png';

        let posX = WORLD_SIZE / 2;
        let posY = WORLD_SIZE / 2 + 500; 
        let speed = 5;
        let currentFrame = 0;
        const keys = { ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false };

        // Array untuk menyimpan data gedung untuk deteksi tabrakan
        const buildings = [];

        function addObject(x, y, width, height, imgUrl, linkUrl) {
            // 1. Tambah ke Dunia Visual
            const div = document.createElement('div');
            div.className = 'building-object';
            div.style.width = width + 'px';
            div.style.height = height + 'px';
            div.style.left = (x - width/2) + 'px';
            div.style.top = (y - height) + 'px';
            div.style.backgroundImage = `url(${imgUrl})`;
            div.style.backgroundSize = 'contain';
            div.style.backgroundRepeat = 'no-repeat';
            div.style.zIndex = Math.floor(y);
            objectsLayer.appendChild(div);

            // 2. Tambah Indikator ke Minimap
            const dot = document.createElement('div');
            dot.className = 'minimap-dot';
            dot.style.left = (x / WORLD_SIZE * miniSize) + 'px';
            dot.style.top = (y / WORLD_SIZE * miniSize) + 'px';
            minimap.appendChild(dot);

            // 3. Simpan data untuk deteksi tabrakan
            buildings.push({
                x: x,
                y: y,
                width: width * 0.5, // Area sensitif (lebih kecil dari gambar agar pas)
                height: 50,         // Area kaki gedung
                link: linkUrl,
                isOpen: false       // Agar tidak membuka terus menerus saat bersentuhan
            });
        }

        function initLevel() {
            ctx.fillStyle = '#2d5e32';
            ctx.fillRect(0, 0, WORLD_SIZE, WORLD_SIZE);
            
            // Tambahkan 3 Gedung dengan Web Berbeda
            addObject(WORLD_SIZE/2, WORLD_SIZE/2, 1200, 800, URL_GEDUNG, "https://www.google.com");
            addObject(700, 800, 600, 450, URL_GEDUNG, "https://www.wikipedia.org");
            addObject(2300, 2200, 800, 600, URL_GEDUNG, "https://blog.google");
        }

        function checkInteractions() {
            let hitAny = false;
            buildings.forEach(b => {
                // Cek apakah player menyentuh area kaki gedung
                const dx = Math.abs(posX - b.x);
                const dy = Math.abs(posY - b.y);

                if (dx < b.width / 2 && dy < b.height) {
                    hitAny = true;
                    if (!b.isOpen) {
                        b.isOpen = true; // Kunci agar tidak spam tab
                        interMsg.style.display = 'block';
                        interMsg.innerText = `Membuka: ${b.link}`;
                        
                        setTimeout(() => {
                            window.open(b.link, '_blank');
                        }, 500);

                        // Reset kunci setelah 3 detik menjauh
                        setTimeout(() => { b.isOpen = false; }, 3000);
                    }
                }
            });

            if (!hitAny) interMsg.style.display = 'none';
        }

        function update() {
            let dirX = 0;
            if (keys.ArrowUp) posY -= speed;
            if (keys.ArrowDown) posY += speed;
            if (keys.ArrowLeft) { posX -= speed; dirX = -1; }
            if (keys.ArrowRight) { posX += speed; dirX = 1; }

            posX = Math.max(0, Math.min(WORLD_SIZE, posX));
            posY = Math.max(0, Math.min(WORLD_SIZE, posY));

            player.style.left = posX + 'px';
            player.style.top = posY + 'px';
            player.style.zIndex = Math.floor(posY);
            if (dirX !== 0) player.style.transform = `scaleX(${dirX})`;

            const camX = -posX + (window.innerWidth / 2);
            const camY = -posY + (window.innerHeight / 2);
            world.style.transform = `translate(${camX}px, ${camY}px)`;

            miniPlayer.style.left = (posX / WORLD_SIZE * miniSize) + 'px';
            miniPlayer.style.top = (posY / WORLD_SIZE * miniSize) + 'px';

            checkInteractions();
            requestAnimationFrame(update);
        }

        function animateSprite() {
            const isMoving = keys.ArrowUp || keys.ArrowDown || keys.ArrowLeft || keys.ArrowRight;
            player.style.backgroundImage = isMoving ? `url('${URL_RUN}')` : `url('${URL_IDLE}')`;
            const col = currentFrame % 5;
            const row = Math.floor(currentFrame / 5);
            player.style.backgroundPosition = `-${col * 200}px -${row * 200}px`;
            currentFrame = (currentFrame + 1) % 25;
        }

        window.addEventListener('keydown', (e) => { if (keys.hasOwnProperty(e.key)) keys[e.key] = true; });
        window.addEventListener('keyup', (e) => { if (keys.hasOwnProperty(e.key)) keys[e.key] = false; });

        initLevel();
        setInterval(animateSprite, 60); 
        update();
    </script>
</body>
</html>
